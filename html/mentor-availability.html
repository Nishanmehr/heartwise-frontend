<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HeartWise — My Availability</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/navbar.css">
  <link rel="stylesheet" href="../css/components.css">
  <style>
    .wrap { max-width: 620px; margin: 0 auto; padding: 24px 16px 80px; }
    .back-btn { display:inline-flex; align-items:center; gap:5px; color:var(--muted); font-size:13px; cursor:pointer; background:none; border:none; margin-bottom:16px; padding:0; }
    .back-btn:hover { color:var(--text); }

    /* Header */
    .page-header { margin-bottom: 24px; }
    .page-header h2 { font-size: 22px; font-weight: 800; color: var(--text); margin-bottom: 4px; }
    .date-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(123,94,167,.1); color: #7B5EA7;
      border: 1px solid rgba(123,94,167,.2);
      padding: 8px 16px; border-radius: 20px;
      font-size: 14px; font-weight: 600; margin-top: 8px;
    }

    /* Card */
    .card { background: var(--card); border-radius: 16px; border: 1px solid var(--border); padding: 20px; margin-bottom: 16px; }
    .card-title { font-size: 13px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 16px; }

    /* Add slot row */
    .add-slot-row { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 16px; flex-wrap: wrap; }
    .field { flex: 1; min-width: 120px; }
    .field label { display:block; font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
    .field input, .field select {
      width:100%; padding:10px 12px; border:1.5px solid var(--border);
      border-radius:10px; font-size:13px; background:var(--bg);
      color:var(--text); outline:none; transition:border .2s; box-sizing:border-box;
    }
    .field input:focus, .field select:focus { border-color:#7B5EA7; }

    .add-btn {
      padding: 10px 20px; background: linear-gradient(135deg,#7B5EA7,#5A3E85);
      color: #fff; border: none; border-radius: 10px;
      font-size: 13px; font-weight: 700; cursor: pointer;
      white-space: nowrap; transition: opacity .2s;
    }
    .add-btn:hover { opacity: .9; }

    /* Slots list */
    .slots-list { display: flex; flex-direction: column; gap: 10px; }
    .slot-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; border-radius: 12px;
      border: 1px solid var(--border); background: var(--bg);
    }
    .slot-item.available { border-color: rgba(74,222,128,.4); background: rgba(74,222,128,.06); }
    .slot-item.booked    { border-color: rgba(232,82,106,.4); background: rgba(232,82,106,.06); }

    .slot-info { display: flex; align-items: center; gap: 10px; }
    .slot-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .slot-dot.green { background: #4ade80; }
    .slot-dot.red   { background: #E8526A; }
    .slot-text { font-size: 14px; font-weight: 600; color: var(--text); }
    .slot-duration { font-size: 12px; color: var(--muted); }
    .slot-badge {
      font-size: 11px; font-weight: 700; padding: 3px 10px;
      border-radius: 20px;
    }
    .slot-badge.available { background: rgba(74,222,128,.15); color: #4ade80; }
    .slot-badge.booked    { background: rgba(232,82,106,.15); color: #E8526A; }

    .del-slot {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 16px; padding: 4px;
      transition: color .2s;
    }
    .del-slot:hover { color: #E8526A; }

    .empty-slots { text-align: center; padding: 24px; color: var(--muted); font-size: 14px; }

    /* Legend */
    .legend { display: flex; gap: 16px; margin-bottom: 12px; font-size: 12px; color: var(--muted); }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

    /* Save */
    .save-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg,#7B5EA7,#5A3E85);
      color: #fff; border: none; border-radius: 14px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      transition: all .2s;
    }
    .save-btn:hover { opacity: .9; transform: translateY(-1px); }

    .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#1a1a2e; color:#fff; padding:12px 24px; border-radius:12px; font-size:14px; display:none; z-index:9999; }
  </style>
</head>
<body>

  <nav class="nav">
    <a class="logo" href="dashboard.html">Heart<span>wise</span></a>
    <div class="nav-right">
      <div class="avatar-sm" id="navAvatar">M</div>
    </div>
  </nav>

  <div class="wrap">
    <button class="back-btn" onclick="location.href='dashboard.html'">← Back to Dashboard</button>

    <div class="page-header">
      <h2>📅 Today's Availability</h2>
      <div class="date-badge">
        📆 <span id="todayDate">Loading...</span>
      </div>
    </div>

    <!-- Add Slot -->
    <div class="card">
      <div class="card-title">➕ Add Time Slot</div>
      <div class="add-slot-row">
        <div class="field">
          <label>Start Time</label>
          <input type="time" id="slotStart" value="09:00">
        </div>
        <div class="field">
          <label>End Time</label>
          <input type="time" id="slotEnd" value="10:00">
        </div>
        <div class="field">
          <label>Duration</label>
          <select id="slotDuration">
            <option value="30">30 min</option>
            <option value="60">60 min</option>
            <option value="90">90 min</option>
          </select>
        </div>
        <button class="add-btn" onclick="addSlot()">+ Add</button>
      </div>

      <!-- Slots List -->
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#4ade80"></div> Available</div>
        <div class="legend-item"><div class="legend-dot" style="background:#E8526A"></div> Already Booked</div>
      </div>
      <div class="slots-list" id="slotsList">
        <div class="empty-slots">No slots added yet. Add your available time slots above!</div>
      </div>
    </div>

    <button class="save-btn" onclick="saveSlots()">💾 Save Today's Availability</button>
  </div>

  <div class="toast" id="toast"></div>

  <script src="../js/utils.js"></script>
  <script src="../js/api.js"></script>
  <script>
    var API    = 'https://heartwise-backend-production.up.railway.app/api';
    var MID    = localStorage.getItem('userId');
    var TODAY  = new Date();
    var slots  = []; // { start, end, duration, booked }
    var bookedSlotLabels = [];

    // Auth check
    if (!localStorage.getItem('token') || localStorage.getItem('role') !== 'MENTOR') {
      location.replace('index.html');
    }

    // Show today's date
    var days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    document.getElementById('todayDate').textContent =
      days[TODAY.getDay()] + ', ' + TODAY.getDate() + ' ' + months[TODAY.getMonth()] + ' ' + TODAY.getFullYear();

    function showToast(msg) {
      var t = document.getElementById('toast');
      t.textContent = msg; t.style.display = 'block';
      setTimeout(function() { t.style.display = 'none'; }, 3000);
    }

    function timeToMins(t) {
      var p = t.split(':'); return parseInt(p[0])*60 + parseInt(p[1]);
    }

    function formatTime(t) {
      var p    = t.split(':');
      var h    = parseInt(p[0]), m = parseInt(p[1]);
      var ampm = h >= 12 ? 'PM' : 'AM';
      var h12  = h % 12 === 0 ? 12 : h % 12;
      return h12 + (m === 0 ? '' : ':' + String(m).padStart(2,'0')) + ' ' + ampm;
    }

    function addSlot() {
      var start    = document.getElementById('slotStart').value;
      var end      = document.getElementById('slotEnd').value;
      var duration = parseInt(document.getElementById('slotDuration').value);

      if (!start || !end) { showToast('Please select start and end time ⚠️'); return; }
      if (timeToMins(start) >= timeToMins(end)) { showToast('End time must be after start time ⚠️'); return; }

      // Check overlap
      for (var i = 0; i < slots.length; i++) {
        var s = slots[i];
        if (timeToMins(start) < timeToMins(s.end) && timeToMins(end) > timeToMins(s.start)) {
          showToast('This slot overlaps with an existing slot ⚠️'); return;
        }
      }

      var label    = formatTime(start) + ' – ' + formatTime(end);
      var isBooked = bookedSlotLabels.some(function(b) { return b.includes(formatTime(start)); });

      slots.push({ start: start, end: end, duration: duration, label: label, booked: isBooked });
      slots.sort(function(a,b) { return timeToMins(a.start) - timeToMins(b.start); });
      renderSlots();
    }

    function removeSlot(idx) {
      if (slots[idx].booked) { showToast('Cannot remove a booked slot ❌'); return; }
      slots.splice(idx, 1);
      renderSlots();
    }

    function renderSlots() {
      var list = document.getElementById('slotsList');
      if (slots.length === 0) {
        list.innerHTML = '<div class="empty-slots">No slots added yet. Add your available time slots above!</div>';
        return;
      }
      var html = '';
      slots.forEach(function(s, i) {
        var cls  = s.booked ? 'booked' : 'available';
        html += '<div class="slot-item ' + cls + '">' +
          '<div class="slot-info">' +
            '<div class="slot-dot ' + (s.booked ? 'red' : 'green') + '"></div>' +
            '<div>' +
              '<div class="slot-text">' + s.label + '</div>' +
              '<div class="slot-duration">' + s.duration + ' min sessions</div>' +
            '</div>' +
          '</div>' +
          '<div style="display:flex;align-items:center;gap:8px;">' +
            '<span class="slot-badge ' + cls + '">' + (s.booked ? '🔴 Booked' : '🟢 Available') + '</span>' +
            (!s.booked ? '<button class="del-slot" onclick="removeSlot(' + i + ')">✕</button>' : '') +
          '</div>' +
        '</div>';
      });
      list.innerHTML = html;
    }

    async function saveSlots() {
      var dateStr  = TODAY.toISOString().split('T')[0];
      var dayName  = days[TODAY.getDay()];

      // Convert slots to availability format
      var data = slots.map(function(s) {
        return {
          dayOfWeek:    dayName,
          startTime:    s.start,
          endTime:      s.end,
          slotDuration: s.duration,
          active:       true,
          date:         dateStr,
          label:        s.label
        };
      });

      try {
        var res = await fetch(API + '/availability/' + MID, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify(data)
        });
        var result = await res.json();
        if (res.ok) showToast('✅ ' + (result.message || 'Availability saved!'));
        else        showToast('❌ Failed to save');
      } catch(e) {
        showToast('Error saving ❌');
      }
    }

    async function init() {
      var name = localStorage.getItem('username') || 'M';
      var av   = document.getElementById('navAvatar');
      if (av) av.textContent = name.charAt(0).toUpperCase();

      // Load booked slots
      try {
        var res  = await fetch(API + '/sessions/mentor/' + MID);
        var sess = await res.json();
        bookedSlotLabels = (sess || [])
          .filter(function(s) { return s.status === 'ACCEPTED' || s.status === 'PENDING'; })
          .map(function(s) { return s.slot || ''; });
      } catch(e) { bookedSlotLabels = []; }

      // Load today's saved slots
      try {
        var res2 = await fetch(API + '/availability/' + MID);
        var data = await res2.json();
        if (data && data.length > 0) {
          var todayDay = days[TODAY.getDay()];
          data.filter(function(av) {
            return av.active && av.dayOfWeek === todayDay;
          }).forEach(function(av) {
            var label    = formatTime(av.startTime) + ' – ' + formatTime(av.endTime);
            var isBooked = bookedSlotLabels.some(function(b) { return b.includes(formatTime(av.startTime)); });
            slots.push({
              start:    av.startTime,
              end:      av.endTime,
              duration: av.slotDuration,
              label:    label,
              booked:   isBooked
            });
          });
          slots.sort(function(a,b) { return timeToMins(a.start) - timeToMins(b.start); });
          renderSlots();
        }
      } catch(e) {}
    }

    window.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
