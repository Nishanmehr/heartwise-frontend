<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HeartWise — My Availability</title>

<link rel="stylesheet" href="../css/variables.css">
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/navbar.css">
<link rel="stylesheet" href="../css/components.css">

<style>
.wrap { max-width: 680px; margin: auto; padding: 20px; }
.day-card { border:1px solid #ccc; padding:15px; margin-bottom:10px; border-radius:10px; }
.day-settings { display:none; margin-top:10px; }
.day-settings.show { display:block; }
.slot { background:#4ade80; padding:6px 10px; margin:4px; border-radius:8px; display:inline-block; }
</style>
</head>

<body>

<div class="wrap">
<h2>My Availability</h2>

<div id="dayCards"></div>

<button onclick="saveAvailability()">Save</button>

<h3>Preview</h3>
<div id="previewSlots"></div>

</div>

<script>
const BASE_URL = 'https://heartwise-backend-production.up.railway.app/api';
const TOKEN = localStorage.getItem('token');
const MENTOR_ID = localStorage.getItem('userId');

const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

const schedule = {};
DAYS.forEach(d=>{
  schedule[d] = { active:false, startTime:'09:00', endTime:'18:00', slotDuration:30 };
});

function toggleDay(day){
  schedule[day].active = !schedule[day].active;
  buildUI();
  updatePreview();
}

function updateField(day, field, value){
  schedule[day][field] = field==='slotDuration'? parseInt(value):value;
  updatePreview();
}

function buildUI(){
  const container = document.getElementById('dayCards');
  container.innerHTML='';

  DAYS.forEach(day=>{
    const s = schedule[day];

    const div = document.createElement('div');
    div.className='day-card';

    div.innerHTML=`
      <b>${day}</b>
      <button onclick="toggleDay('${day}')">${s.active?'ON':'OFF'}</button>

      <div class="day-settings ${s.active?'show':''}">
        Start: <input type="time" value="${s.startTime}" onchange="updateField('${day}','startTime',this.value)">
        End: <input type="time" value="${s.endTime}" onchange="updateField('${day}','endTime',this.value)">
        Duration:
        <select onchange="updateField('${day}','slotDuration',this.value)">
          <option value="30" ${s.slotDuration==30?'selected':''}>30</option>
          <option value="60" ${s.slotDuration==60?'selected':''}>60</option>
        </select>
      </div>
    `;

    container.appendChild(div);
  });
}

/* SLOT LOGIC */
function timeToMins(t){
  let [h,m]=t.split(':');
  return parseInt(h)*60+parseInt(m);
}

function minsToTime(m){
  let h=Math.floor(m/60);
  let min=m%60;
  let ampm=h>=12?'PM':'AM';
  let h12=h%12===0?12:h%12;
  return h12+':'+String(min).padStart(2,'0')+' '+ampm;
}

function generateSlots(startTime,endTime,duration){
  let slots=[];
  let start=timeToMins(startTime);
  let end=timeToMins(endTime);

  if(start>=end) return [];

  while(start+duration<=end){
    slots.push(minsToTime(start));
    start+=duration;
  }
  return slots;
}

function updatePreview(){
  const container=document.getElementById('previewSlots');
  let html='';
  let any=false;

  DAYS.forEach(day=>{
    let s=schedule[day];
    if(!s.active) return;

    let slots=generateSlots(s.startTime,s.endTime,s.slotDuration);

    slots.forEach(slot=>{
      any=true;
      html+=`<div class="slot">${day} ${slot}</div>`;
    });
  });

  container.innerHTML = any?html:'No slots';
}

/* API */
async function saveAvailability(){

  for(let d of DAYS){
    let s=schedule[d];
    if(s.active && s.startTime>=s.endTime){
      alert(d+" invalid time");
      return;
    }
  }

  let data=DAYS.map(day=>({
    dayOfWeek:day,
    ...schedule[day]
  }));

  try{
    let res=await fetch(BASE_URL+'/availability/'+MENTOR_ID,{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':'Bearer '+TOKEN
      },
      body:JSON.stringify(data)
    });

    if(res.ok) alert("Saved");
    else alert("Failed");

  }catch(e){
    alert("Error");
  }
}

async function loadAvailability(){
  try{
    let res=await fetch(BASE_URL+'/availability/'+MENTOR_ID,{
      headers:{'Authorization':'Bearer '+TOKEN}
    });

    let data=await res.json();

    data.forEach(av=>{
      if(schedule[av.dayOfWeek]){
        schedule[av.dayOfWeek]=av;
      }
    });

  }catch(e){}
}

/* INIT */
window.onload=async ()=>{
  if(!TOKEN || localStorage.getItem('role')!=='MENTOR'){
    window.location='index.html';
    return;
  }

  await loadAvailability();
  buildUI();
  updatePreview();
};
</script>

</body>
</html>
