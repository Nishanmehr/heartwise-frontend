<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HeartWise – Chat</title>
  <link rel="stylesheet" href="../css/variables.css"/>
  <link rel="stylesheet" href="../css/base.css"/>
  <link rel="stylesheet" href="../css/navbar.css"/>

  <!-- SockJS + STOMP from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

  <style>
    :root {
      --chat-bg: #f9f4ff;
      --bubble-me: #7c3aed;
      --bubble-them: #ffffff;
      --bubble-me-text: #ffffff;
      --bubble-them-text: #1a1a2e;
      --input-bg: #ffffff;
      --header-bg: #7c3aed;
      --header-text: #ffffff;
      --timestamp: #9ca3af;
      --shadow: 0 2px 12px rgba(124,58,237,0.10);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--chat-bg);
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    #chat-header {
      background: var(--header-bg);
      color: var(--header-text);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: var(--shadow);
      flex-shrink: 0;
    }

    #back-btn {
      background: none;
      border: none;
      color: #fff;
      font-size: 22px;
      cursor: pointer;
      line-height: 1;
    }

    #chat-avatar {
      width: 42px; height: 42px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,0.5);
      background: #c4b5fd;
    }

    #chat-peer-name {
      font-size: 17px;
      font-weight: 600;
      flex: 1;
    }

    #connection-status {
      font-size: 12px;
      opacity: 0.85;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #f87171;
      transition: background 0.3s;
    }
    .status-dot.connected { background: #4ade80; }

    /* ── Message list ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 18px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }

    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }
    .msg-row.me  { flex-direction: row-reverse; }
    .msg-row.them { flex-direction: row; }

    .msg-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      background: #c4b5fd;
    }

    .bubble {
      max-width: 68%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 14.5px;
      line-height: 1.5;
      position: relative;
      word-break: break-word;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }

    .msg-row.me  .bubble {
      background: var(--bubble-me);
      color: var(--bubble-me-text);
      border-bottom-right-radius: 4px;
    }
    .msg-row.them .bubble {
      background: var(--bubble-them);
      color: var(--bubble-them-text);
      border-bottom-left-radius: 4px;
    }

    .bubble-time {
      font-size: 10.5px;
      margin-top: 4px;
      color: var(--timestamp);
      text-align: right;
    }
    .msg-row.me .bubble-time  { color: rgba(255,255,255,0.65); text-align: right; }

    /* Date separator */
    .date-separator {
      text-align: center;
      font-size: 11.5px;
      color: #9ca3af;
      margin: 6px 0;
      position: relative;
    }
    .date-separator::before, .date-separator::after {
      content: '';
      display: inline-block;
      width: 28%;
      height: 1px;
      background: #e5e7eb;
      vertical-align: middle;
      margin: 0 8px;
    }

    /* System message */
    .sys-msg {
      text-align: center;
      font-size: 12px;
      color: #9ca3af;
      background: #f3e8ff;
      padding: 6px 14px;
      border-radius: 20px;
      align-self: center;
    }

    /* Typing indicator */
    #typing-indicator {
      display: none;
      align-items: center;
      gap: 5px;
      padding: 4px 14px;
      font-size: 12.5px;
      color: #9ca3af;
    }
    .typing-dots span {
      display: inline-block;
      width: 6px; height: 6px;
      background: #9ca3af;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-5px); }
    }

    /* ── Input bar ── */
    #input-bar {
      background: var(--input-bg);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-top: 1px solid #ede9fe;
      flex-shrink: 0;
    }

    #msg-input {
      flex: 1;
      border: 1.5px solid #ddd6fe;
      border-radius: 24px;
      padding: 10px 16px;
      font-size: 14.5px;
      outline: none;
      resize: none;
      max-height: 110px;
      line-height: 1.4;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    #msg-input:focus { border-color: var(--bubble-me); }

    #send-btn {
      background: var(--bubble-me);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 44px; height: 44px;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.1s;
    }
    #send-btn:hover  { background: #6d28d9; }
    #send-btn:active { transform: scale(0.93); }
    #send-btn:disabled { background: #c4b5fd; cursor: default; }

    /* Loading / error states */
    #loading-overlay {
      position: fixed; inset: 0;
      background: rgba(255,255,255,0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 100;
      font-size: 15px;
      color: #7c3aed;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 4px solid #ddd6fe;
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #error-banner {
      display: none;
      background: #fef2f2;
      color: #dc2626;
      padding: 10px 16px;
      font-size: 13px;
      text-align: center;
      border-bottom: 1px solid #fecaca;
    }

    @media (max-width: 480px) {
      .bubble { max-width: 82%; }
    }
  </style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <span>Connecting to chat…</span>
</div>

<div id="error-banner"></div>

<!-- Header -->
<div id="chat-header">
  <button id="back-btn" onclick="history.back()">&#8592;</button>
<img id="chat-avatar" src="" alt="Avatar" 
  onerror="this.src='https://ui-avatars.com/api/?name=U&background=c4b5fd&color=fff'"/>
    <div>
    <div id="chat-peer-name">Loading…</div>
    <div id="connection-status">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">Connecting…</span>
    </div>
  </div>
</div>

<!-- Messages -->
<div id="messages"></div>

<!-- Typing indicator -->
<div id="typing-indicator">
  <div class="typing-dots">
    <span></span><span></span><span></span>
  </div>
  <span id="typing-name"></span> is typing…
</div>

<!-- Input -->
<div id="input-bar">
  <textarea id="msg-input" placeholder="Type a message…" rows="1"
    onkeydown="handleKeydown(event)" oninput="autoResize(this)"></textarea>
  <button id="send-btn" onclick="sendMessage()" disabled>&#9658;</button>
</div>

<script src="../js/utils.js"></script>
<script src="../js/api.js"></script>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
const CHAT_BASE_URL = 'https://heartwise-backend-7y6y.onrender.com';
const API_URL       = CHAT_BASE_URL + '/api';

const myId      = parseInt(localStorage.getItem('userId'));
const myName    = localStorage.getItem('username') || 'You';
const myRole    = localStorage.getItem('role');     // 'USER' or 'MENTOR'
const token     = localStorage.getItem('token');

// bookingId + peerId come from query params: chat.html?bookingId=5&peerId=2&peerName=Sara
const params    = new URLSearchParams(location.search);
const bookingId = parseInt(params.get('bookingId'));
const peerId    = parseInt(params.get('peerId'));
const peerName  = decodeURIComponent(params.get('peerName') || 'Mentor');
const peerPic   = params.get('peerPic') ? decodeURIComponent(params.get('peerPic')) : null;

let stompClient = null;
let connected   = false;
let lastDate    = null;

// ─── Init ─────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  if (!token || !myId || !bookingId) {
    showError('Missing session info. Please go back and try again.');
    return;
  }

  // Set header
  document.getElementById('chat-peer-name').textContent = peerName;
  if (peerPic) document.getElementById('chat-avatar').src = peerPic;

  loadHistory();
  connectWebSocket();
});

// ─── Load chat history ────────────────────────────────────────────────────────
async function loadHistory() {
  try {
    const res = await fetch(
      `${API_URL}/chat/history/${bookingId}?userId=${myId}&role=${myRole}`,
      { headers: { 'Authorization': 'Bearer ' + token } }
    );
    if (!res.ok) throw new Error('Failed to load history');
    const msgs = await res.json();
    msgs.forEach(m => appendMessage(m, false));
    scrollToBottom();
  } catch (e) {
    console.warn('History load error:', e);
  }
}

// ─── WebSocket ────────────────────────────────────────────────────────────────
function connectWebSocket() {
  const sock   = new SockJS(CHAT_BASE_URL + '/ws');
  stompClient  = Stomp.over(sock);
  stompClient.debug = null; // silence debug logs

  stompClient.connect(
    { Authorization: 'Bearer ' + token },
    onConnected,
    onError
  );
}

function onConnected() {
  connected = true;
  hideLoading();
  setStatus(true);

  // Enable send button
  document.getElementById('send-btn').disabled = false;

  // Subscribe to this booking's topic
  stompClient.subscribe(`/topic/chat/${bookingId}`, (frame) => {
    const msg = JSON.parse(frame.body);
    // Don't double-render our own messages (we append on send)
    if (msg.senderId !== myId) {
      appendMessage(msg, true);
    }
  });
}

function onError(err) {
  console.error('WS error:', err);
  setStatus(false);
  hideLoading();
  // Retry after 5s
  setTimeout(connectWebSocket, 5000);
}

// ─── Send ─────────────────────────────────────────────────────────────────────
function sendMessage() {
  const input = document.getElementById('msg-input');
  const text  = input.value.trim();
  if (!text || !connected) return;

  const payload = {
    bookingId,
    senderId:   myId,
    senderName: myName,
    senderRole: myRole,
    message:    text
  };

  // Optimistically render own message
  appendMessage({
    ...payload,
    sentAt: new Date().toISOString()
  }, true);

  stompClient.send('/app/chat.send', {}, JSON.stringify(payload));

  input.value = '';
  autoResize(input);
  scrollToBottom();
}

function handleKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

// ─── Render message ───────────────────────────────────────────────────────────
function appendMessage(msg, animate) {
  const container = document.getElementById('messages');
  const isMe      = msg.senderId === myId;

  // Date separator
  const msgDate = formatDate(msg.sentAt);
  if (msgDate !== lastDate) {
    const sep = document.createElement('div');
    sep.className = 'date-separator';
    sep.textContent = msgDate;
    container.appendChild(sep);
    lastDate = msgDate;
  }

  const row = document.createElement('div');
  row.className = `msg-row ${isMe ? 'me' : 'them'}`;
  if (animate) row.style.animation = 'none'; // could add fade-in later

const avatarSrc = isMe
  ? (localStorage.getItem('profilePic') || `https://ui-avatars.com/api/?name=${encodeURIComponent(myName)}&background=7c3aed&color=fff`)
  : (peerPic || `https://ui-avatars.com/api/?name=${encodeURIComponent(peerName)}&background=e8526a&color=fff`);


  row.innerHTML = `
    <img class="msg-avatar" src="${avatarSrc}" alt="avatar"
onerror="this.src='https://ui-avatars.com/api/?name=U&background=c4b5fd&color=fff'"/>
    <div>
      <div class="bubble">
        ${escapeHtml(msg.message)}
        <div class="bubble-time">${formatTime(msg.sentAt)}</div>
      </div>
    </div>
  `;

  container.appendChild(row);
  if (animate) scrollToBottom();
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function scrollToBottom() {
  const el = document.getElementById('messages');
  el.scrollTop = el.scrollHeight;
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 110) + 'px';
}

function setStatus(online) {
  document.getElementById('status-dot').classList.toggle('connected', online);
  document.getElementById('status-text').textContent = online ? 'Online' : 'Reconnecting…';
}

function hideLoading() {
  document.getElementById('loading-overlay').style.display = 'none';
}

function showError(msg) {
  hideLoading();
  const banner = document.getElementById('error-banner');
  banner.textContent = msg;
  banner.style.display = 'block';
}

function formatTime(isoStr) {
  const d = new Date(isoStr);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function formatDate(isoStr) {
  const d   = new Date(isoStr);
  const now = new Date();
  if (d.toDateString() === now.toDateString()) return 'Today';
  const yest = new Date(now); yest.setDate(now.getDate() - 1);
  if (d.toDateString() === yest.toDateString()) return 'Yesterday';
  return d.toLocaleDateString([], { day: 'numeric', month: 'short', year: 'numeric' });
}

function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/\n/g, '<br/>');
}
</script>
</body>
</html>
